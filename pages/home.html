<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>

<body class="bg-gray-100 min-h-screen">
    <!-- header -->
    <header class="bg-white">
        <section class="max-w-11/12 mx-auto flex justify-between py-6 ">
            <a href="/pages/home.html" class="flex items-center gap-1">
                <img src="/assests/github-logo.png" class="w-9" alt="">
                <p class="font-bold">GitHub Issues Tracker</p>
            </a>

            <!-- search -->

            <div class="join">
                <div>
                    <label class="input validator join-item">
                        <input type="text" placeholder="search" class="focus:outline-0" required />
                    </label>
                    <div class="validator-hint hidden">Enter valid email address</div>
                </div>
                <button class="btn btn-primary join-item">Search</button>
            </div>

        </section>
    </header>
    <!-- ------------------- -->

    <!-- active Bar -->
    <div id="buttonContainer" class="max-w-7xl mx-auto bg-white p-4 py-5 shadow-md mt-2 space-x-2 lg:mt-12">
        <button class="btn-nav btn btn-primary">All</button>
        <button class="btn-nav btn">Open</button>
        <button class="btn-nav btn">Closed</button>
    </div>

    <!-- issues section -->
    <section class="max-w-7xl mx-auto md:mt-5 bg-white">
        <div class="flex justify-between items-center py-5 bg-white p-5  border-b border-gray-200">
            <div class="flex gap-3 items-center">
                <div>
                    <img src="/assests/Aperture.png" alt="">
                </div>
                <div>
                    <h1 class="font-bold"><span>50</span> Issues </h1>
                    <p class="text-gray-500">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex items-center gap-5">
                <div class="flex items-center gap-1">
                    <div>
                        <p class="p-2 rounded-full bg-green-800 inline-block"></p>
                    </div>
                    <p>Open</p>
                </div>
                <div class="flex items-center gap-1">
                    <div>
                        <p class="p-2 rounded-full bg-purple-900 inline-block"></p>
                    </div>
                    <p>Open</p>
                </div>
            </div>
        </div>

    </section>
    <!-- card section -->
    <section id="issueContainer" class="mt-5 grid grid-cols-3 p-4 mx-auto max-w-7xl bg-white">
        <div class="max-w-sm bg-white border-0 border-t-4 border-red-600 rounded-xl shadow-sm overflow-hidden hidden">
            <div class="p-5">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <img src="/assests/Open-Status.png" alt="">
                    </div>
                    <span
                        class="px-5 py-1 bg-red-50 text-red-500 text-xs font-bold tracking-widest rounded-full uppercase">
                        High
                    </span>
                </div>

                <h3 class="text-xl font-bold text-slate-800 leading-tight mb-2">
                    Fix Navigation Menu On Mobile Devices
                </h3>

                <p class="text-slate-500 text-sm mb-5">
                    The navigation menu doesn't collapse properly on mobile devices...
                </p>

                <div class="flex gap-2 mb-4">
                    <span
                        class="inline-flex items-center gap-1 px-3 py-1 bg-red-50 border border-red-100 text-red-500 text-sm font-medium rounded-full">
                        BUG
                    </span>
                    <span
                        class="inline-flex items-center gap-1 px-3 py-1 bg-orange-50 border border-orange-100 text-orange-600 text-sm font-medium rounded-full">
                        HELP WANTED
                    </span>
                </div>
            </div>

            <div class="px-5 py-4 border-t border-gray-100 bg-white">
                <div class="text-slate-500 text-sm space-y-1">
                    <p>#1 by <span class="hover:underline cursor-pointer">john_doe</span></p>
                    <p>1/15/2024</p>
                </div>
            </div>
        </div>
    </section>

    <script src="/script/script.js"></script>
</body>

</html>
